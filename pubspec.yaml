name: nyota
description: "Math is Easy"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'     # Supports Flutter 3.41.1 (textScaler is available here)

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2
  shared_preferences: ^2.3.2
  intl: ^0.20.2
  http: ^1.1.0
  json_annotation: ^4.8.1
  image_picker: ^1.2.1
  flutter_tts: ^4.0.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  flutter_secure_storage: ^10.0.0
  flutter_screenutil: ^5.9.3
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.7.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Fredoka
      fonts:
        - asset: assets/fonts/FredokaOne-Regular.ttf

