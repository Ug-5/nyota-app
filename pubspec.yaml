name: nyota
description: "Math is Easy"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  http: ^1.1.0
  json_annotation: ^4.8.1
  image_picker: ^1.2.1
  flutter_tts: ^4.0.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  json_serializable: ^6.7.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Fredoka
      fonts:
        - asset: assets/fonts/FredokaOne-Regular.ttf